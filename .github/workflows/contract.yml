name: contract
on:
  push:
    branches: [main, dev]
    paths: ["theia-core/**", "theia-panel/**", "schemas/**", "examples/**"]
  pull_request:
    paths: ["theia-core/**", "theia-panel/**", "schemas/**", "examples/**"]

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Install core
        working-directory: theia-core
        run: pip install -e ".[dev]"
      - name: Generate graph.json from example fixtures
        run: |
          PYTHONPATH=theia-core python -c "
          from pathlib import Path
          from tests.db_helpers import seed_test_db
          db = Path('/tmp/theia_example.db')
          seed_test_db(db, Path('examples/sessions'))
          print(f'seeded {db}')
          "
          python -m theia_core --db-path /tmp/theia_example.db -o examples/graph.json
      - name: Validate example graph against schema
        run: |
          pip install check-jsonschema
          check-jsonschema --schemafile schemas/graph.schema.json examples/graph.json
      - name: Install panel
        working-directory: theia-panel
        run: npm ci && npm run generate-types
      - name: Headless panel smoke test
        working-directory: theia-panel
        run: npm run test -- --run
