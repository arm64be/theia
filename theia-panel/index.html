<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>theia dev</title>
    <style>
      html,
      body,
      #app {
        height: 100%;
        margin: 0;
        background: #07080d;
        color: #cfd6e4;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      import { mount } from "/src/index.ts";
      const ctrl = await mount(document.getElementById("app"), "/graph.json", {
        pollIntervalMs: 5000,
      });
      // expose for debugging
      window.theia = ctrl;
    </script>
  </body>
</html>
