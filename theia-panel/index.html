<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>theia dev</title>
    <style>
      html,
      body,
      #app {
        height: 100%;
        margin: 0;
        background: #07080d;
        color: #cfd6e4;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      import { mount } from "/src/index.ts";

      // Support ?graph=<url> query param for iframe embedding
      const params = new URLSearchParams(window.location.search);
      const graphUrl = params.get("graph") || "/graph.json";

      const ctrl = await mount(document.getElementById("app"), graphUrl);

      // Emit events to parent frame via postMessage (for dashboard integration)
      if (window.parent !== window) {
        ctrl.on("node-click", (nodeId) => {
          window.parent.postMessage({ type: "node-click", nodeId }, "*");
        });
        ctrl.on("node-hover", (nodeId) => {
          window.parent.postMessage({ type: "node-hover", nodeId }, "*");
        });
      }
    </script>
  </body>
</html>
